services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_db
    depends_on:
      - postgres
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

  frontend:
    build: ./frontend
    ports:
      - "5173:3000"
    depends_on:
      - backend